<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>DoctorDashboard</title>
  <link rel="icon" th:href="@{/assets/images/favicon.ico}" />
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}">
  <link rel="stylesheet" th:href="@{/assets/css/style.css}">
  <script th:src="@{/js/render.js}" defer></script>
  <script th:src="@{/js/util.js}" defer></script>
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <input type="text" id="searchBar" placeholder="search by patient name" class="input-field" />

        <div class="filter-wrapper">
          <button id="todayButton" class="button">Today's Appointments</button>
          <input type="date" id="datePicker" class="input-field" />
        </div>

        <table id="patientTable">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Prescription</th>
            </tr>
          </thead>
          <tbody id="patientTableBody"></tbody>
        </table>
      </main>

      <div id="footer"></div>
    </div>
  </div>

  <script type="module" th:src="@{/js/doctorDashboard.js}" defer></script>
</body>
</html>
