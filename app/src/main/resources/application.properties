spring.application.name=back_end

# MySQL connection settings
spring.datasource.url=jdbc:mysql://localhost:3306/cms?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB connection settings
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=prescriptions

# Static resource settings (CSS/JS served from static/)
spring.web.resources.static-locations=classpath:/static/

# Thymeleaf settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# JWT secret used to sign/validate tokens (placeholder - replace with a strong secret before production)
jwt.secret=smartClinicSecretKeyChangeThisInProduction123456
