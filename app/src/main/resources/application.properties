spring.application.name=back_end

# MySQL (relational data: patients, doctors, admin, appointments)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_clinic_db
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB (document data: prescriptions)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=smart_clinic_mongo
